<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>S&S</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script></head><body>
<header><a href="#"><img src="logo.png"><b>S&S</b></a><nav><a href="#">Home</a><a href="#admin">Admin</a></nav></header>
<main id="site"><section class="hero"><small>CURATED FOR YOU</small><h1>Welcome to <em>S&S</em></h1><p>Discover handpicked styles and collections. Click any product to explore it.</p><a class="btn" href="#collections">Explore Collections</a></section><section id="collections" class="wrap"><h2>Featured Collections</h2><div id="catalog">Loading…</div></section></main>
<main id="admin" class="wrap hide"><section id="login" class="panel"><h1>S&S Admin</h1><form id="loginForm"><input id="email" type="email" placeholder="Email" required><input id="password" type="password" placeholder="Password" required><button>Sign in</button></form><p id="loginMsg"></p></section>
<section id="dash" class="hide"><div class="top"><h1>Manage S&S</h1><button id="logout">Sign out</button></div><div class="cols"><section class="panel"><h2>Add Section</h2><form id="sectionForm"><input id="sname" placeholder="Section name" required><textarea id="sdesc" placeholder="Description"></textarea><input id="sorder" type="number" value="0"><button>Add Section</button></form><div id="sections"></div></section>
<section class="panel"><h2>Add Product</h2><form id="productForm"><select id="psection" required></select><input id="pname" placeholder="Product name" required><textarea id="pdesc" placeholder="Description"></textarea><input id="plink" type="url" placeholder="Product / affiliate link" required><input id="pimage" type="file" accept="image/*" required><input id="porder" type="number" value="0"><button>Upload & Add</button></form></section></div><section class="panel"><h2>Products</h2><div id="products"></div></section><p id="msg"></p></section></main>
<footer><img src="logo.png"><p>© 2026 S&S · Handpicked styles, selected for you.</p></footer><script src="app.js"></script></body></html>
